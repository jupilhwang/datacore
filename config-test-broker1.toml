[broker]
broker_id = 1
cluster_id = "datacore-test"
host = "0.0.0.0"
port = 9092
max_connections = 1000
cluster_brokers = ["127.0.0.1:9092", "127.0.0.1:9094"]

[broker.replication]
enabled = true
port = 9093
replica_count = 2
timeout_ms = 5000

[storage]
engine = "memory"

[storage.memory]
max_memory_mb = 1024
segment_size_bytes = 104857600

[rest]
enabled = true
host = "0.0.0.0"
port = 8080

[observability.logging]
level = "debug"
format = "json"
console_output = true
