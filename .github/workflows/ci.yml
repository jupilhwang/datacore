# DataCore CI/CD Pipeline
# Runs on every push and pull request

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  V_VERSION: "0.5"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup V
        uses: vlang/setup-v@v1.4
        with:
          version: ${{ env.V_VERSION }}
      
      - name: Check formatting
        run: v fmt -verify src/
      
      - name: Run vet
        run: v vet src/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup V
        uses: vlang/setup-v@v1.4
        with:
          version: ${{ env.V_VERSION }}
      
      - name: Run unit tests
        run: |
          cd src
          v test service/auth/ infra/auth/ infra/protocol/kafka/ infra/observability/
      
      - name: Run domain tests
        run: |
          cd tests/unit
          v test domain/ || echo "No domain tests yet"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact_name: datacore
            asset_name: datacore-linux-amd64
          - os: ubuntu-latest
            target: linux-arm64
            artifact_name: datacore
            asset_name: datacore-linux-arm64
            cross_compile: true
          - os: macos-latest
            target: macos-amd64
            artifact_name: datacore
            asset_name: datacore-darwin-amd64
          - os: macos-14
            target: macos-arm64
            artifact_name: datacore
            asset_name: datacore-darwin-arm64
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup V
        uses: vlang/setup-v@v1.4
        with:
          version: ${{ env.V_VERSION }}
      
      - name: Build (native)
        if: ${{ !matrix.cross_compile }}
        run: |
          cd src
          v -prod -o ../bin/${{ matrix.artifact_name }} .
      
      - name: Build (cross-compile linux-arm64)
        if: ${{ matrix.cross_compile && matrix.target == 'linux-arm64' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          cd src
          v -prod -cc aarch64-linux-gnu-gcc -o ../bin/${{ matrix.artifact_name }} .
      
      - name: Create archive
        run: |
          cd bin
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a ../${{ matrix.asset_name }}.zip ${{ matrix.artifact_name }}
          else
            tar -czvf ../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz
          retention-days: 7
