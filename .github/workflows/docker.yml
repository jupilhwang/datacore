# DataCore Docker Build (for development/testing)
# Builds Docker image on main branch pushes

name: Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  V_VERSION: "0.5"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux-amd64
            cross_compile: false
          - target: linux-arm64
            cross_compile: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup V
        uses: vlang/setup-v@v1.4
        with:
          version: ${{ env.V_VERSION }}
      
      - name: Build (native)
        if: ${{ !matrix.cross_compile }}
        run: |
          cd src
          v -prod -o ../bin/datacore .
      
      - name: Build (cross-compile arm64)
        if: ${{ matrix.cross_compile }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          cd src
          v -prod -cc aarch64-linux-gnu-gcc -o ../bin/datacore .
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: datacore-${{ matrix.target }}
          path: bin/datacore

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      
      - name: Download AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: datacore-linux-amd64
          path: docker-context/linux-amd64
      
      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: datacore-linux-arm64
          path: docker-context/linux-arm64
      
      - name: Make binaries executable
        run: |
          chmod +x docker-context/linux-amd64/datacore
          chmod +x docker-context/linux-arm64/datacore
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=dev
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
