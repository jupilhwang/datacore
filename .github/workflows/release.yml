# DataCore Release Pipeline
# Creates releases when a tag is pushed

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  V_VERSION: "0.5"

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-amd64
            artifact_name: datacore
            asset_name: datacore-linux-amd64
          - os: ubuntu-22.04
            target: linux-arm64
            artifact_name: datacore
            asset_name: datacore-linux-arm64
            cross_compile: true
          - os: macos-latest
            target: darwin-amd64
            artifact_name: datacore
            asset_name: datacore-darwin-amd64
          - os: macos-14
            target: darwin-arm64
            artifact_name: datacore
            asset_name: datacore-darwin-arm64
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup V
        uses: vlang/setup-v@v1.4
        with:
          version: ${{ env.V_VERSION }}
      
      - name: Install dependencies (Linux)
        if: ${{ runner.os == 'Linux' && !matrix.cross_compile }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libsnappy-dev liblz4-dev libzstd-dev libpq-dev libnuma-dev liburing-dev zlib1g-dev

      - name: Install dependencies (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: |
          brew install openssl snappy lz4 zstd postgresql

      - name: Build (native)
        if: ${{ !matrix.cross_compile }}
        run: |
          cd src
          v -prod -enable-globals -d use_openssl -o ../bin/${{ matrix.artifact_name }} .
      
      - name: Build (cross-compile linux-arm64)
        if: ${{ matrix.cross_compile && matrix.target == 'linux-arm64' }}
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu \
            libssl-dev:arm64 libsnappy-dev:arm64 liblz4-dev:arm64 \
            libzstd-dev:arm64 libpq-dev:arm64 libnuma-dev:arm64 \
            liburing-dev:arm64 zlib1g-dev:arm64
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
          cd src
          v -prod -enable-globals -d use_openssl -cc aarch64-linux-gnu-gcc -cflags "-I/usr/include -I/usr/include/aarch64-linux-gnu -L/usr/lib/aarch64-linux-gnu" -o ../bin/${{ matrix.artifact_name }} .
      
      - name: Prepare release archive
        run: |
          mkdir -p release
          cp bin/${{ matrix.artifact_name }} release/
          cp config.toml release/
          cp -r docs release/ 2>/dev/null || true
          cp README.md release/ 2>/dev/null || true
          cp LICENSE release/ 2>/dev/null || true
          cd release
          tar -czvf ../${{ matrix.asset_name }}.tar.gz .
      
      - name: Generate SHA256 checksum
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          else
            sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.tar.gz.sha256

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec cp {} release-files/ \;
          ls -la release-files/
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Generate release notes
        id: release_notes
        run: |
          cat << 'EOF' > release_notes.md
          ## DataCore ${{ steps.version.outputs.VERSION }}
          
          Kafka-compatible message broker written in V language.
          
          ### Downloads
          
          | Platform | Architecture | Download |
          |----------|--------------|----------|
          | Linux | x86_64 | `datacore-linux-amd64.tar.gz` |
          | Linux | ARM64 | `datacore-linux-arm64.tar.gz` |
          | macOS | x86_64 | `datacore-darwin-amd64.tar.gz` |
          | macOS | ARM64 (Apple Silicon) | `datacore-darwin-arm64.tar.gz` |
          
          ### Installation
          
          ```bash
          # Download and extract
          tar -xzf datacore-<platform>-<arch>.tar.gz
          
          # Run the broker
          ./datacore broker start
          ```
          
          ### Verify checksum
          
          ```bash
          sha256sum -c datacore-<platform>-<arch>.tar.gz.sha256
          ```
          
          ### Features
          
          - 🚀 Kafka protocol compatible
          - 🔐 SASL PLAIN authentication
          - 📊 Schema Registry (Avro, JSON Schema, Protobuf)
          - 📈 Prometheus metrics
          - 🔍 OpenTelemetry tracing support
          
          EOF
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: DataCore ${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
