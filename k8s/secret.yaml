apiVersion: v1
kind: Secret
metadata:
  name: datacore-secrets
  namespace: datacore
type: Opaque
stringData:
  S3_BUCKET: "datacore-production"
  S3_ENDPOINT: "https://s3.amazonaws.com"
  S3_REGION: "us-east-1"
  AWS_ACCESS_KEY_ID: "your-access-key"
  AWS_SECRET_ACCESS_KEY: "your-secret-key"
  JWT_SECRET: "super_secret_jwt_key"