apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: datacore-ingress
  namespace: datacore
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: datacore.production.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: datacore
            port:
              number: 8080